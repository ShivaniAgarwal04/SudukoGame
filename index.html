<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Sudoku</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cosmos-background">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="orbiting-lines">
            <div class="orbit"></div>
            <div class="orbit"></div>
        </div>
        <div class="particles" id="particles-container"></div>
    </div>

    <div class="game-container">
        <header>
            <h1 class="logo glow-text">Cosmic Sudoku</h1>
            <div class="status-bar">
                <span class="timer">00:00</span>
                <span class="mistakes">Mistakes: 0/3</span>
            </div>
            <div class="level-panel">
                <button class="level-btn active" data-level="easy">Easy</button>
                <button class="level-btn" data-level="medium">Medium</button>
                <button class="level-btn" data-level="hard">Hard</button>
            </div>
        </header>

        <main class="sudoku-board-wrapper">
            <div class="sudoku-board" id="sudoku-board">
                <!-- Grid cells will be generated by JS -->
            </div>
        </main>

        <aside class="number-panel-wrapper">
            <div class="number-panel" id="number-panel">
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2</button>
                <button class="num-btn" data-val="3">3</button>
                <button class="num-btn" data-val="4">4</button>
                <button class="num-btn" data-val="5">5</button>
                <button class="num-btn" data-val="6">6</button>
                <button class="num-btn" data-val="7">7</button>
                <button class="num-btn" data-val="8">8</button>
                <button class="num-btn" data-val="9">9</button>
                <button class="action-btn" id="erase-btn" title="Erase">⌫</button>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
